name: Main

on:
  push:
    branches: [main]

permissions:
  actions: write
  packages: write
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  linting-packer:
    name: Linting
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Hadolint
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: packer/Dockerfile

  build-packer:
    name: Build
    uses: ilyes512/github-actions/.github/workflows/build.yml@1.0.12
    needs: linting-packer
    strategy:
      fail-fast: false
      matrix:
        runs-on:
          - os: ubuntu-24.04
            platform: linux/amd64
          - os: ubuntu-24.04-arm
            platform: linux/arm64
    with:
      runs-on: ${{ matrix.runs-on.os }}
      platform: ${{ matrix.runs-on.platform }}
      image-name: ghcr.io/${{ github.repository_owner }}/packer
      dockerfile: packer/Dockerfile
      title: packer
      description: Docker Image with HashiCorp Packer installed

  merge:
    name: Merge
    uses: ilyes512/github-actions/.github/workflows/merge.yml@1.0.12
    needs: build-packer
    with:
      runs-on: ubuntu-24.04
      image-name: ghcr.io/${{ github.repository_owner }}/packer
      title: packer
      description: Docker Image with HashiCorp Packer installed

  store-digest:
    name: Store Digest
    runs-on: ubuntu-24.04
    needs: merge
    steps:
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Get and store image digest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          IMAGE_NAME="ghcr.io/${{ github.repository_owner }}/packer"
          IMAGE_NAME_LOWER=$(echo "$IMAGE_NAME" | tr '[:upper:]' '[:lower:]')
          
          # Get the digest of the main image
          DIGEST=$(docker buildx imagetools inspect "${IMAGE_NAME_LOWER}:main" --format '{{json .Manifest.Digest}}' | tr -d '"')
          
          echo "Image digest: $DIGEST"
          echo "Commit SHA: ${{ github.sha }}"
          
          # Store digest as a repository variable for use in tag workflow
          if gh api /repos/${{ github.repository }}/actions/variables/PACKER_MAIN_DIGEST 2>/dev/null; then
            gh api --method PATCH /repos/${{ github.repository }}/actions/variables/PACKER_MAIN_DIGEST \
              -f name='PACKER_MAIN_DIGEST' \
              -f value="${DIGEST}"
          else
            gh api --method POST /repos/${{ github.repository }}/actions/variables \
              -f name='PACKER_MAIN_DIGEST' \
              -f value="${DIGEST}"
          fi
          
          # Also store the commit SHA that produced this digest
          if gh api /repos/${{ github.repository }}/actions/variables/PACKER_MAIN_COMMIT 2>/dev/null; then
            gh api --method PATCH /repos/${{ github.repository }}/actions/variables/PACKER_MAIN_COMMIT \
              -f name='PACKER_MAIN_COMMIT' \
              -f value="${{ github.sha }}"
          else
            gh api --method POST /repos/${{ github.repository }}/actions/variables \
              -f name='PACKER_MAIN_COMMIT' \
              -f value="${{ github.sha }}"
          fi
